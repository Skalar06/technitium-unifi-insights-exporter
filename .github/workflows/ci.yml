name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-test-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - name: Set up .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68
        with:
          dotnet-version: 10.0.100
      - name: Build and test
        run: ./scripts/test.sh
      - name: Dependency audit
        run: |
          source scripts/common.sh
          run_dotnet list TechnitiumUniFiInsightsExporter.slnx package --vulnerable --include-transitive
      - name: Validate public content
        run: ./scripts/validate-public-content.sh
      - name: Build package
        run: ./scripts/package.sh
      - name: Verify reproducibility
        run: ./scripts/verify-reproducible.sh
      - name: Upload package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: TechnitiumUniFiInsightsExporter-0.1.0
          path: |
            dist/TechnitiumUniFiInsightsExporter-0.1.0.zip
            dist/TechnitiumUniFiInsightsExporter-0.1.0.zip.sha256
          if-no-files-found: error
