name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a
        with:
          languages: csharp
      - name: Prepare Technitium references
        run: ./scripts/prepare-references.sh
      - uses: github/codeql-action/autobuild@7188fc363630916deb702c7fdcf4e481b751f97a
        env:
          TechnitiumReferencePath: ${{ github.workspace }}/.references/15.4.0
      - id: analyze
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a
        with:
          output: results
          upload: ${{ github.event.repository.private && 'never' || 'always' }}
      - name: Upload private-repository SARIF
        if: github.event.repository.private == true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: codeql-sarif
          path: results/csharp.sarif
          if-no-files-found: error
          retention-days: 30
